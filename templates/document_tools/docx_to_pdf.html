{% extends "base.html" %}
{% block content %}
<div class="tool-shell col-lg-7">
    <h2>DOCX to PDF</h2>
    <p class="text-secondary">Convert uploaded DOCX files to PDF.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <input class="form-control" type="file" name="file" accept=".docx" required>
        </div>
        <button class="btn btn-brand">Convert</button>
    </form>
</div>
{% endblock %}
