{% extends "base.html" %}
{% block content %}
<div class="tool-shell col-lg-7">
    <h2>Compress PDF</h2>
    <p class="text-secondary">Reduce size while preserving readability.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input class="form-control" type="file" name="file" accept=".pdf" required>
        <div class="row g-2 mt-1">
            <div class="col">
                <label class="form-label">Target size</label>
                <input class="form-control" type="number" step="0.1" min="0.1" name="target_size_value" placeholder="Optional">
            </div>
            <div class="col">
                <label class="form-label">Unit</label>
                <select class="form-select" name="target_size_unit">
                    <option value="kb">KB</option>
                    <option value="mb">MB</option>
                </select>
            </div>
        </div>
        <button class="btn btn-brand mt-3">Compress</button>
    </form>
</div>
{% endblock %}
