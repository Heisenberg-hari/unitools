{% extends "base.html" %}
{% block content %}
<div class="tool-shell col-lg-7">
    <h2>Watermark PDF</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <input class="form-control" type="file" name="file" accept=".pdf" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Watermark text</label>
            <input class="form-control" name="watermark_text" value="CONFIDENTIAL">
        </div>
        <button class="btn btn-brand">Apply Watermark</button>
    </form>
</div>
{% endblock %}
