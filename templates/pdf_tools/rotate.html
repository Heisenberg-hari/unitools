{% extends "base.html" %}
{% block content %}
<div class="tool-shell col-lg-7">
    <h2>Rotate PDF</h2>
    <p class="text-secondary">Rotate every page by the same angle.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">PDF File</label>
            <input class="form-control" type="file" name="file" accept=".pdf" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Degrees</label>
            <select class="form-select" name="degrees">
                <option value="90">90</option>
                <option value="180">180</option>
                <option value="270">270</option>
            </select>
        </div>
        <button class="btn btn-brand">Rotate</button>
    </form>
</div>
{% endblock %}
